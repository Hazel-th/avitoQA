[pytest]
addopts = -ra
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = .
markers =
    smoke: короткая проверка, что основные ручки работают
    regression: основная функциональная проверка API
    contract: строгая проверка структуры ответов
    known_bugs: кейсы на уже найденные баги стенда через xfail(strict=True)
